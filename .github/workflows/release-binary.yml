name: release-binary

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: leetcode-aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: leetcode-x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/leetcode"
          cp "$BIN" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rolling
          name: rolling
          prerelease: true
          generate_release_notes: false
          body: |
            Auto-built binary from `main` (prefers Chinese `translatedContent` when present).

            Install (macOS Apple Silicon):
            ```sh
            gh release download rolling -R Wongbuer/leetcode-cli -p 'leetcode-aarch64-apple-darwin' -O leetcode
            chmod +x leetcode && mv leetcode ~/.cargo/bin/leetcode
            ```
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}