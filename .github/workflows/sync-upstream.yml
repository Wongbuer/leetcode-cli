name: sync-upstream

on:
  schedule:
    # every 6 hours
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and merge upstream/main
        id: sync
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/clearloop/leetcode-cli.git
          git fetch upstream main
          BEFORE=$(git rev-parse HEAD)
          if git merge --no-edit upstream/main; then
            AFTER=$(git rev-parse HEAD)
            if [ "$BEFORE" = "$AFTER" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "No new upstream commits."
            else
              git push origin HEAD:main
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Merged and pushed upstream/main."
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::error::Merge conflict with upstream/main — resolve manually."
            git merge --abort || true
            exit 1
          fi
